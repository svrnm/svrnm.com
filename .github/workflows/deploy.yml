name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

# Default to bash
defaults:
  run:
    shell: bash

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
# Following OpenSSF best practices: least privilege principle
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Pin Hugo version for reproducible builds
      HUGO_VERSION: "0.146.0"
    steps:
      - name: Checkout repository
        # OpenSSF: Pin to specific version (v4) - for maximum security, pin to full commit SHA
        # Example: uses: actions/checkout@b1ec3021b8fa02164da82ca1557d017d83b0e179
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify submodules
        # Ensure submodules are properly initialized
        run: |
          if [ -f .gitmodules ]; then
            git submodule status
            git submodule update --init --recursive || true
          fi

      - name: Setup Hugo
        # OpenSSF: Pin to specific version (v2) - for maximum security, pin to full commit SHA
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Pages
        # OpenSSF: Pin to specific version (v5) - for maximum security, pin to full commit SHA
        uses: actions/configure-pages@v5
        id: pages

      - name: Build with Hugo
        run: |
          hugo \
            --minify \
            --baseURL ${{ steps.pages.outputs.base_url }}

      - name: Upload artifact
        # OpenSSF: Pin to specific version (v3) - for maximum security, pin to full commit SHA
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        # OpenSSF: Pin to specific version (v4) - for maximum security, pin to full commit SHA
        # Using OIDC for authentication (OpenSSF: prefer OIDC over PATs)
        uses: actions/deploy-pages@v4
        id: deployment
