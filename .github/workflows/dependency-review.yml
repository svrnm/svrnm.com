name: Dependency Review

on:
  pull_request:
    branches:
      - main

# OpenSSF best practice: Review dependencies in pull requests
permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Dependency Review
        # OpenSSF: Use GitHub's official dependency review action
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-2.0, GPL-3.0
