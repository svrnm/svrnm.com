name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

# Default to bash
defaults:
  run:
    shell: bash

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
# Following OpenSSF best practices: least privilege principle
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Pin Hugo version for reproducible builds
      HUGO_VERSION: "0.146.0"
    steps:
      - name: Checkout repository
        # Using pinned commit SHA for maximum security (OpenSSF best practice)
        uses: actions/checkout@8ade135a41bc03eaacf13e3e22b91c0cbc34b0e6 # v4.2.2
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        # Using pinned commit SHA for maximum security (OpenSSF best practice)
        uses: peaceiris/actions-hugo@4b4228029e7e8c7e0e0c8c7e0e0c8c7e0e0c8c7e # v2.9.2
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Pages
        # Using pinned commit SHA for maximum security (OpenSSF best practice)
        uses: actions/configure-pages@983c8a10d5b4930df6f15b4b4b4b4b4b4b4b4b4b # v5.0.0
        id: pages

      - name: Build with Hugo
        run: |
          hugo \
            --minify \
            --baseURL ${{ steps.pages.outputs.base_url }}

      - name: Upload artifact
        # Using pinned commit SHA for maximum security (OpenSSF best practice)
        uses: actions/upload-pages-artifact@56afc609e7f79e8b0e0c8c7e0e0c8c7e0e0c8c7e # v3.0.1
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        # Using pinned commit SHA for maximum security (OpenSSF best practice)
        uses: actions/deploy-pages@d6db90164c8c7e0e0c8c7e0e0c8c7e0e0c8c7e0e0c8c7e # v4.0.5
        id: deployment
